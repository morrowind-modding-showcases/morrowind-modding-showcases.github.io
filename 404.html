<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found</title>
<link rel="icon" type="image/png" href="/assets/images/icon.png">
<script>
// GitHub Pages serves this page for every missing path. Modathon routes are
// client-side, so forward them to the app, which restores the path from ?p=.
(function () {
  var m = location.pathname.match(/^\/modathon\/(.+)/);
  if (m) location.replace('/modathon/?p=' + encodeURIComponent(m[1].replace(/\/+$/, '')));
})();
</script>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #14100c;
    color: #d8c9a3;
    font-family: Georgia, 'Times New Roman', serif;
    text-align: center;
  }
  h1 { font-size: 3rem; margin: 0 0 0.5rem; }
  p { margin: 0.25rem 0; }
  a { color: #c9a45c; }
</style>
</head>
<body>
<main>
  <h1>404</h1>
  <p>This page has been lost to the ashlands.</p>
  <p><a href="/">Return to the homepage</a></p>
</main>
</body>
</html>
