  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

       <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- rarest unlocks -->\n      <div style=\"background: var(--panel); border: var(--border-w) solid var(--panel-border); border-radius: var(--radius); box-shadow: var(--panel-shadow); padding: 18px 22px;\">\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; font-family: var(--font-display);\">RAREST UNLOCKS<\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;\">\n          <sc-for list=\"{{ m.rares }}\" as=\"ra\" hint-placeholder-count=\"6\">\n            <div style=\"background: var(--panel-flat); border: 1px solid var(--panel-border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; align-items: center;\">\n              <img src=\"{{ ra.img }}\" alt=\"\" style=\"width: 44px; height: 44px; border-radius: 6px; flex: 0 0 auto;\">\n              <div style=\"min-width: 0;\">\n                <div style=\"font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ ra.name }}<\u002Fdiv>\n                <div style=\"font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ ra.req }}<\u002Fdiv>\n                <div style=\"font-size: 11px; color: var(--danger); font-weight: 600; margin-top: 2px;\">{{ ra.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- categories -->\n      <div style=\"background: var(--panel); border: var(--border-w) solid var(--panel-border); border-radius: var(--radius); box-shadow: var(--panel-shadow); padding: 18px 22px;\">\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; font-family: var(--font-display);\">WHAT THEY MAKE<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n          <sc-for list=\"{{ m.catBars }}\" as=\"cb\" hint-placeholder-count=\"5\">\n            <div style=\"display: flex; align-items: center; gap: 10px; font-size: 14px;\">\n              <span style=\"width: 260px; color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ cb.label }}<\u002Fspan>\n              <div style=\"flex: 1; height: 12px; background: var(--bar-bg); border-radius: 6px; overflow: hidden;\">\n                <div style=\"height: 100%; width: {{ cb.pct }}%; background: var(--bar-fill); box-shadow: var(--bar-glow);\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width: 26px; font-weight: 700; text-align: right;\">{{ cb.count }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- mods by year -->\n      <div style=\"background: var(--panel); border: var(--border-w) solid var(--panel-border); border-radius: var(--radius); box-shadow: var(--panel-shadow); padding: 18px 22px;\">\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; font-family: var(--font-display);\">THE MODS<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 16px;\">\n          <sc-for list=\"{{ m.modYears }}\" as=\"my\" hint-placeholder-count=\"3\">\n            <div>\n              <div style=\"font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 8px; color: var(--accent);\">{{ my.year }}<\u002Fdiv>\n              <sc-if value=\"{{ my.hasData }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\">\n                  <sc-for list=\"{{ my.mods }}\" as=\"mod\" hint-placeholder-count=\"2\">\n                    <a href=\"{{ mod.url }}\" target=\"_blank\" style=\"background: var(--panel-flat); border: 1px solid var(--panel-border); border-radius: var(--radius); padding: 12px 14px; display: block; color: var(--ink); text-decoration: none;\">\n                      <div style=\"font-size: 14px; font-weight: 700; color: var(--accent);\">{{ mod.name }}<\u002Fdiv>\n                      <div style=\"font-size: 12px; color: var(--muted); margin-top: 2px;\">{{ mod.category }} · {{ mod.authors }}<\u002Fdiv>\n                    <\u002Fa>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ my.noData }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"border: 1px dashed var(--panel-border); border-radius: var(--radius); padding: 12px 14px; background: repeating-linear-gradient(45deg, transparent, transparent 8px, var(--bar-bg) 8px, var(--bar-bg) 9px); font-family: var(--font-flavor); font-size: 13px; color: var(--soft);\">mod list not imported yet for {{ my.year }} — {{ my.achCount }} achievements earned that year<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"text-align: center; font-family: var(--font-flavor); font-size: 14px; color: var(--soft);\">{{ footerLine }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 900}, &quot;defaultTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;day&quot;, &quot;night&quot;], &quot;default&quot;: &quot;day&quot;, &quot;tsType&quot;: &quot;'day' | 'night'&quot;, &quot;section&quot;: &quot;Theme&quot;}, &quot;leaderboardCount&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;min&quot;: 3, &quot;max&quot;: 25, &quot;section&quot;: &quot;Home page&quot;}}\">\nclass Component extends DCLogic {\n  state = { loading: true, view: 'home', modderId: null, q: '', theme: 'day' };\n\n  componentDidMount() {\n    const saved = (() => { try { return localStorage.getItem('mmr-theme'); } catch (e) { return null; } })();\n    const theme = saved || this.props.defaultTheme || 'day';\n    this.applyTheme(theme, false);\n    this.parseHash();\n    window.addEventListener('hashchange', () => this.parseHash());\n    this.loadData();\n  }\n\n  applyTheme(theme, persist) {\n    document.body.classList.toggle('night', theme === 'night');\n    if (persist) { try { localStorage.setItem('mmr-theme', theme); } catch (e) {} }\n    this.setState({ theme });\n  }\n\n  parseHash() {\n    const h = location.hash || '';\n    let mMatch = h.match(/^#\\/modder\\/(.+)$/);\n    if (mMatch) this.setState({ view: 'modder', modderId: decodeURIComponent(mMatch[1]) });\n    else if (h === '#/modders') this.setState({ view: 'modders' });\n    else this.setState({ view: 'home' });\n    window.scrollTo(0, 0);\n  }\n\n  nav(view, modderId) {\n    if (view === 'modder') location.hash = '#/modder/' + encodeURIComponent(modderId);\n    else if (view === 'modders') location.hash = '#/modders';\n    else location.hash = '#/';\n  }\n\n  async loadData() {\n    try {\n      const R = (id, fb) => (window.__resources && window.__resources[id]) || fb;\n      const moddersJson = await (await fetch(R('modders', 'assets/data/modathon-modders.json'))).json();\n      const canonical = moddersJson.modders || [];\n      const yearSet = new Set();\n      canonical.forEach(c => (c.participationYears || []).forEach(y => yearSet.add(y)));\n      const years = [...yearSet].sort();\n\n      const yearData = {};\n      const modsData = {};\n      await Promise.all(years.map(async y => {\n        const R2 = (id, fb) => (window.__resources && window.__resources[id]) || fb;\n        try { yearData[y] = await (await fetch(R2('y' + y, `assets/data/modathon-${y}.json`))).json(); } catch (e) {}\n        try {\n          const r = await fetch(R2('mods' + y, `assets/data/modathon-${y}-mods.json`));\n          if (r.ok) modsData[y] = await r.json();\n        } catch (e) {}\n      }));\n\n      // Build per-modder database\n      const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');\n      const byKey = new Map();\n      const keyOf = name => name.trim().toLowerCase();\n      canonical.forEach(c => byKey.set(keyOf(c.name), { id: c.id, name: c.name, url: c.url, ach: [], mods: [], years: new Set() }));\n\n      const medians = {};\n      const participantsByYear = {};\n      let unlockEvents = 0;\n      Object.entries(yearData).forEach(([y, d]) => {\n        const year = +y;\n        const counts = {};\n        (d.achievements || []).forEach(a => {\n          (a.unlockedBy || []).forEach(n => {\n            unlockEvents++;\n            const k = keyOf(n);\n            counts[k] = (counts[k] || 0) + 1;\n            if (!byKey.has(k)) byKey.set(k, { id: slug(n), name: n, url: null, ach: [], mods: [], years: new Set() });\n            const rec = byKey.get(k);\n            rec.years.add(year);\n            rec.ach.push({ year, ...a });\n          });\n        });\n        const vals = Object.values(counts).sort((a, b) => a - b);\n        medians[year] = vals.length ? vals[Math.floor(vals.length / 2)] : 0;\n        participantsByYear[year] = vals.length;\n      });\n\n      Object.entries(modsData).forEach(([y, d]) => {\n        (d.mods || []).forEach(mod => {\n          const authorsLower = (mod.authors || '').toLowerCase();\n          byKey.forEach(rec => {\n            if (authorsLower.includes(rec.name.toLowerCase())) rec.mods.push({ year: +y, ...mod });\n          });\n        });\n      });\n\n      const dataYears = years.filter(y => yearData[y]);\n      this.db = { years: dataYears, yearData, modsData, medians, participantsByYear, byKey, unlockEvents,\n        totalDefined: Object.values(yearData).reduce((s, d) => s + (d.achievements || []).length, 0),\n        totalMods: Object.values(modsData).reduce((s, d) => s + (d.mods || []).length, 0) };\n      this.setState({ loading: false });\n    } catch (e) {\n      console.error('data load failed', e);\n      this.setState({ loading: false });\n    }\n  }\n\n  bucket(a) {\n    const k = ((a.rarityKey || '') + ' ' + (a.rarity || '')).toLowerCase();\n    if (k.includes('gold') || k.includes('ruby')) return 'gold';\n    if (k.includes('silver')) return 'silver';\n    if (k.includes('copper') || k.includes('bronze')) return 'bronze';\n    if (k.includes('category')) return 'category';\n    if (k.includes('challenge')) return 'challenge';\n    if (k.includes('metric')) return 'metrics';\n    if (k.includes('hidden')) return 'hidden';\n    return 'other';\n  }\n\n  scoreOf(achList) {\n    const w = { gold: 100, silver: 50, bronze: 25, hidden: 40, challenge: 30, category: 20, metrics: 10, other: 15 };\n    return achList.reduce((s, a) => s + (w[this.bucket(a)] || 15), 0);\n  }\n\n  streakOf(yearsArr) {\n    const ys = [...yearsArr].sort((a, b) => a - b);\n    let best = 0, bestStart = null, run = 0, runStart = null;\n    for (let i = 0; i < ys.length; i++) {\n      if (i > 0 && ys[i] === ys[i - 1] + 1) { run++; }\n      else { run = 1; runStart = ys[i]; }\n      if (run > best) { best = run; bestStart = runStart; }\n    }\n    return { len: best, start: bestStart, end: bestStart != null ? bestStart + best - 1 : null };\n  }\n\n  modderVals(rec) {\n    const db = this.db;\n    const yearsArr = [...rec.years].sort();\n    const byYear = {};\n    rec.ach.forEach(a => { byYear[a.year] = (byYear[a.year] || 0) + 1; });\n    const maxCount = Math.max(1, ...Object.values(byYear));\n    const bestYear = Object.entries(byYear).sort((a, b) => b[1] - a[1])[0] || [null, 0];\n    const streak = this.streakOf(yearsArr);\n    const rares = [...rec.ach].sort((a, b) => (a.unlockedCount || 999) - (b.unlockedCount || 999)).slice(0, 6);\n    const oneOfOnes = rec.ach.filter(a => a.unlockedCount === 1).length;\n    const rarity = {};\n    rec.ach.forEach(a => { const b = this.bucket(a); rarity[b] = (rarity[b] || 0) + 1; });\n    const rarityMeta = [\n      ['gold', 'Gold', 'radial-gradient(circle at 35% 30%, #e6cd7a, #c8a951 60%, #8a6d2a)'],\n      ['silver', 'Silver', 'radial-gradient(circle at 35% 30%, #f2f2f0, #b9b9b3 60%, #7d7d76)'],\n      ['bronze', 'Bronze / Copper', 'radial-gradient(circle at 35% 30%, #e0a878, #b0703c 60%, #7a4a22)'],\n      ['hidden', 'Hidden', 'radial-gradient(circle at 35% 30%, #9a8fc4, #6a5a9e 60%, #443768)'],\n      ['challenge', 'Weekly challenges', 'radial-gradient(circle at 35% 30%, #8fc4a4, #5a9e78 60%, #37684c)'],\n      ['category', 'Category badges', 'radial-gradient(circle at 35% 30%, #c4b48f, #9e8a5a 60%, #685a37)'],\n      ['metrics', 'Milestones', 'radial-gradient(circle at 35% 30%, #8fb0c4, #5a849e 60%, #375568)'],\n      ['other', 'Standard', 'radial-gradient(circle at 35% 30%, #cccccc, #999999 60%, #666666)'],\n    ];\n    const cats = {};\n    rec.ach.filter(a => a.group === 'category').forEach(a => {\n      const m = (a.requirement || '').match(/Release (?:a |an |the )?(.+?) Mod/i);\n      const label = m ? m[1] : a.name;\n      cats[label] = (cats[label] || 0) + 1;\n    });\n    const maxCat = Math.max(1, ...Object.values(cats));\n    const masterCount = rec.ach.filter(a => /master of madness/i.test(a.name)).length;\n\n    const chips = [\n      { label: 'Modding since ' + (yearsArr[0] || '?') },\n      { label: yearsArr.length + (yearsArr.length === 1 ? ' Modathon' : ' Modathons') },\n    ];\n    if (masterCount > 0) chips.push({ label: 'Master of Madness ×' + masterCount });\n    if (rec.url) chips.push({ label: 'Nexus profile ↗', url: rec.url });\n\n    const modsByYear = {};\n    rec.mods.forEach(mod => { (modsByYear[mod.year] = modsByYear[mod.year] || []).push(mod); });\n    const modYears = [...yearsArr].reverse().map(y => {\n      const hasData = !!this.db.modsData[y];\n      const mods = (modsByYear[y] || []).map(mod => ({ name: mod.name, category: mod.category, authors: mod.authors, url: mod.url || '#' }));\n      return { year: y, hasData: hasData && mods.length > 0, noData: !hasData || mods.length === 0, mods, achCount: byYear[y] || 0 };\n    });\n\n    return {\n      id: rec.id,\n      name: rec.name,\n      avatarSlotId: 'avatar-' + rec.id,\n      initials: rec.name.split(/\\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase(),\n      total: rec.ach.length,\n      score: this.scoreOf(rec.ach).toLocaleString(),\n      chips,\n      bestYear: bestYear[0], bestCount: bestYear[1], bestMedian: db.medians[bestYear[0]] || 0,\n      streak: streak.len, streakLabel: streak.len > 1 ? streak.start + '–' + streak.end : String(streak.start || ''),\n      oneOfOnes,\n      yearBars: yearsArr.map(y => ({ year: y, count: byYear[y] || 0, median: db.medians[y] || 0, pct: Math.round(100 * (byYear[y] || 0) / maxCount) })),\n      rarityRows: rarityMeta.filter(([k]) => rarity[k]).map(([k, label, dot]) => ({ label, dot, count: rarity[k] })),\n      rares: rares.map(a => ({ name: a.name, req: a.requirement, img: a.imageUrl, meta: a.rarity + ' · ' + a.year + ' · ' + (a.unlockedCount === 1 ? '1 of 1' : a.unlockedCount + ' unlocked') })),\n      catBars: Object.entries(cats).sort((a, b) => b[1] - a[1]).map(([label, count]) => ({ label, count, pct: Math.round(100 * count / maxCat) })),\n      modYears,\n    };\n  }\n\n  renderVals() {\n    const { loading, view, q, theme } = this.state;\n    const night = theme === 'night';\n    const navStyle = active => active\n      ? { bg: 'var(--nav-active-bg)', ink: 'var(--nav-active-ink)', border: 'var(--nav-active-border)' }\n      : { bg: 'var(--nav-idle-bg)', ink: 'var(--nav-idle-ink)', border: 'var(--nav-idle-border)' };\n    const nh = navStyle(view === 'home'), nm = navStyle(view === 'modders' || view === 'modder');\n\n    const base = {\n      loading,\n      isHome: !loading && view === 'home',\n      isModders: !loading && view === 'modders',\n      isModder: false,\n      themeLabel: night ? '☀ DAY' : '☾ NIGHT',\n      toggleTheme: () => this.applyTheme(night ? 'day' : 'night', true),\n      goHome: () => this.nav('home'),\n      goModders: () => this.nav('modders'),\n      navHomeBg: nh.bg, navHomeInk: nh.ink, navHomeBorder: nh.border,\n      navModdersBg: nm.bg, navModdersInk: nm.ink, navModdersBorder: nm.border,\n      q,\n      onSearch: e => this.setState({ q: e.target.value }),\n      tileBorder: night ? 'var(--panel-border)' : 'transparent',\n      footerLine: night ? 'best viewed at 800×600 · you are outlander number 004,213' : 'made for fun by the Morrowind modding community — no ads, no pitch, just numbers',\n      heroTitle: '', heroSub: '', homeTiles: [], yearTiles: [], leaderboard: [], dirRows: [], dirCountLine: '', m: null,\n    };\n    if (loading || !this.db) return base;\n\n    const db = this.db;\n    const all = [...db.byKey.values()].filter(r => r.ach.length > 0);\n\n    if (view === 'home') {\n      const yrs = db.years;\n      const numWords = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve'];\n      base.heroTitle = (numWords[yrs.length] || yrs.length) + ' years of the May Modathon';\n      base.heroSub = `Every badge earned by every modder, ${yrs[0]}–${yrs[yrs.length - 1]}`;\n      base.homeTiles = [\n        { big: String(all.length), label: 'Modders with unlocks', sub: 'across all Modathons', bg: 'var(--tile-1)', border: base.tileBorder },\n        { big: db.unlockEvents.toLocaleString(), label: 'Achievements unlocked', sub: db.totalDefined + ' badges defined over the years', bg: 'var(--tile-2)', border: base.tileBorder },\n        { big: String(yrs.length), label: 'Modathons held', sub: yrs[0] + ' – ' + yrs[yrs.length - 1], bg: 'var(--tile-3)', border: base.tileBorder },\n        { big: String(db.totalMods), label: 'Mods on record', sub: 'from 2025 — more years coming', bg: 'var(--tile-1)', border: base.tileBorder },\n      ];\n      base.yearTiles = yrs.map(y => ({ year: y, participants: db.participantsByYear[y] || 0, defined: (db.yearData[y] && db.yearData[y].achievements || []).length }));\n      const count = Math.max(3, Math.min(25, this.props.leaderboardCount ?? 10));\n      const top = [...all].sort((a, b) => b.ach.length - a.ach.length).slice(0, count);\n      const max = top.length ? top[0].ach.length : 1;\n      base.leaderboard = top.map((r, i) => ({\n        rank: String(i + 1).padStart(2, '0'),\n        name: r.name,\n        yearsLabel: r.years.size + (r.years.size === 1 ? ' year' : ' years'),\n        total: r.ach.length,\n        pct: Math.round(100 * r.ach.length / max),\n        open: () => this.nav('modder', r.id),\n      }));\n    }\n\n    if (view === 'modders') {\n      const ql = q.trim().toLowerCase();\n      const rows = all.filter(r => !ql || r.name.toLowerCase().includes(ql)).sort((a, b) => b.ach.length - a.ach.length);\n      base.dirCountLine = rows.length + ' of ' + all.length + ' modders' + (ql ? ' matching “' + q + '”' : ' — sorted by achievements unlocked');\n      base.dirRows = rows.slice(0, 200).map(r => ({\n        name: r.name,\n        initials: r.name.split(/\\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase(),\n        yearsLabel: [...r.years].sort().join(' · '),\n        rareLabel: (() => { const n = r.ach.filter(a => a.unlockedCount === 1).length; return n ? n + ' × 1-of-1' : ''; })(),\n        total: r.ach.length,\n        open: () => this.nav('modder', r.id),\n      }));\n    }\n\n    if (view === 'modder') {\n      const rec = [...db.byKey.values()].find(r => r.id === this.state.modderId);\n      if (rec) {\n        base.isModder = true;\n        base.m = this.modderVals(rec);\n        base.downloadCard = () => this.drawCard(base.m);\n      } else {\n        base.isModders = true;\n        base.dirCountLine = 'modder not found — showing everyone';\n        base.dirRows = [];\n      }\n    }\n    return base;\n  }\n\n  async drawCard(m) {\n    const night = this.state.theme === 'night';\n    const S = 2;\n    const W = 600 * S, H = 200 * S;\n    const canvas = document.createElement('canvas');\n    canvas.width = W; canvas.height = H;\n    const ctx = canvas.getContext('2d');\n\n    try { await Promise.all([\n      document.fonts.load('700 40px \"Chakra Petch\"'),\n      document.fonts.load('400 30px \"Silkscreen\"'),\n      document.fonts.load('700 20px \"Chakra Petch\"'),\n    ]); } catch (e) {}\n\n    const r = 14 * S;\n    const round = (x, y, w, h, rad) => { ctx.beginPath(); ctx.moveTo(x + rad, y); ctx.arcTo(x + w, y, x + w, y + h, rad); ctx.arcTo(x + w, y + h, x, y + h, rad); ctx.arcTo(x, y + h, x, y, rad); ctx.arcTo(x, y, x + w, y, rad); ctx.closePath(); };\n\n    // background\n    const g = ctx.createLinearGradient(0, 0, 0, H);\n    if (night) { g.addColorStop(0, '#121710'); g.addColorStop(1, '#0c110c'); }\n    else { g.addColorStop(0, '#fdfcf8'); g.addColorStop(0.48, '#ece7d8'); g.addColorStop(0.52, '#ddd5c0'); g.addColorStop(1, '#e8e2d0'); }\n    round(0, 0, W, H, night ? 0 : r);\n    ctx.fillStyle = g; ctx.fill();\n    ctx.lineWidth = 2 * S;\n    ctx.strokeStyle = night ? '#5f8f7a' : '#a89f88';\n    ctx.stroke();\n\n    const ink = night ? '#f0ead6' : '#23201a';\n    const muted = night ? '#94b8a5' : '#6b6350';\n    const gold = night ? '#e6cd7a' : '#8a6d2a';\n\n    // avatar monogram\n    const ax = 20 * S, ay = 20 * S, as = 72 * S;\n    round(ax, ay, as, as, night ? 0 : 8 * S);\n    ctx.fillStyle = night ? '#1c2418' : '#cfc5a8'; ctx.fill();\n    ctx.strokeStyle = night ? '#c8a951' : '#8a6d2a'; ctx.lineWidth = 2 * S; ctx.stroke();\n    ctx.fillStyle = gold;\n    ctx.font = `700 ${26 * S}px \"Chakra Petch\"`;\n    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';\n    const initials = m.name.split(/\\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();\n    ctx.fillText(initials, ax + as / 2, ay + as / 2 + 2 * S);\n\n    // name + line\n    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';\n    ctx.fillStyle = ink;\n    ctx.font = night ? `400 ${21 * S}px \"Silkscreen\"` : `700 ${26 * S}px \"Chakra Petch\"`;\n    ctx.fillText(m.name, 108 * S, 48 * S);\n    ctx.fillStyle = muted;\n    ctx.font = `600 ${12 * S}px \"Chakra Petch\"`;\n    const streakBit = m.streak > 1 ? '  ·  streak ' + m.streakLabel : '';\n    ctx.fillText(m.chips[1].label + streakBit + '  ·  ' + m.oneOfOnes + ' × 1-of-1 unlocks', 108 * S, 70 * S);\n\n    // score, right aligned\n    ctx.textAlign = 'right';\n    ctx.fillStyle = ink;\n    ctx.font = night ? `400 ${26 * S}px \"Silkscreen\"` : `700 ${32 * S}px \"Chakra Petch\"`;\n    ctx.fillText(m.score, W - 24 * S, 48 * S);\n    ctx.fillStyle = muted;\n    ctx.font = `600 ${10 * S}px \"Chakra Petch\"`;\n    ctx.fillText('MADNESS SCORE', W - 24 * S, 66 * S);\n    ctx.fillText(m.total + ' ACHIEVEMENTS', W - 24 * S, 82 * S);\n\n    // divider\n    ctx.strokeStyle = night ? '#3f4a38' : '#b3a98d'; ctx.lineWidth = 1 * S;\n    ctx.beginPath(); ctx.moveTo(20 * S, 108 * S); ctx.lineTo(W - 20 * S, 108 * S); ctx.stroke();\n\n    // rare badges\n    ctx.textAlign = 'left';\n    ctx.fillStyle = muted;\n    ctx.font = `700 ${10 * S}px \"Chakra Petch\"`;\n    ctx.fillText('RAREST UNLOCKS', 20 * S, 126 * S);\n    const rares = m.rares.slice(0, 3);\n    const imgs = await Promise.all(rares.map(ra => new Promise(res => {\n      const img = new Image();\n      img.crossOrigin = 'anonymous';\n      img.onload = () => res(img);\n      img.onerror = () => res(null);\n      img.src = ra.img;\n      setTimeout(() => res(null), 4000);\n    })));\n    rares.forEach((ra, i) => {\n      const bx = 20 * S + i * 190 * S, by = 136 * S, bs = 40 * S;\n      let drew = false;\n      if (imgs[i]) { try { ctx.drawImage(imgs[i], bx, by, bs, bs); drew = true; } catch (e) {} }\n      if (!drew) {\n        ctx.fillStyle = gold;\n        ctx.beginPath(); ctx.moveTo(bx + bs / 2, by); ctx.lineTo(bx + bs, by + bs / 2); ctx.lineTo(bx + bs / 2, by + bs); ctx.lineTo(bx, by + bs / 2); ctx.closePath(); ctx.fill();\n      }\n      ctx.fillStyle = ink;\n      ctx.font = `700 ${11 * S}px \"Chakra Petch\"`;\n      const name = ra.name.length > 22 ? ra.name.slice(0, 21) + '…' : ra.name;\n      ctx.fillText(name, bx + bs + 8 * S, by + 16 * S);\n      ctx.fillStyle = muted;\n      ctx.font = `500 ${10 * S}px \"Chakra Petch\"`;\n      ctx.fillText(ra.meta, bx + bs + 8 * S, by + 32 * S);\n    });\n\n    // footer\n    ctx.fillStyle = night ? '#5f8f7a' : '#8a8272';\n    ctx.font = `600 ${9 * S}px \"Chakra Petch\"`;\n    ctx.textAlign = 'right';\n    ctx.fillText('MODATHON REPLAY · MORROWIND MAY MODATHON', W - 20 * S, H - 12 * S);\n\n    let url;\n    try { url = canvas.toDataURL('image/png'); }\n    catch (e) {\n      // tainted canvas (badge CDN without CORS) — redraw without images\n      console.warn('canvas tainted, retrying without badge images');\n      return this.drawCardPlain(m);\n    }\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = m.name.replace(/\\s+/g, '-').toLowerCase() + '-modder-card.png';\n    a.click();\n  }\n\n  drawCardPlain(m) {\n    const stripped = { ...m, rares: m.rares.map(ra => ({ ...ra, img: 'about:blank' })) };\n    return this.drawCard(stripped);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
