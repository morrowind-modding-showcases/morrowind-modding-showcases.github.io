name: Refresh Nexus stats

# Pulls Nexus metadata once for every unique Nexus-hosted mod across Modathon,
# ModJam, and Madness, then updates all three checked-in datasets.

on:
  schedule:
    - cron: "17 4 * * *" # daily at 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch mod metadata from Nexus API
        run: node scripts/fetch-nexus-stats.mjs
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      - name: Validate refreshed data and site behavior
        run: node --test scripts/*.test.mjs scripts/*.test.cjs

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modathon/assets/data/nexus-stats.json modjam/data/modjams.json madness/data/mods-by-year.json
          git diff --cached --quiet || git commit -m "Update Nexus stats"
          git push
